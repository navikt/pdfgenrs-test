apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: pdfgenrs-test
  namespace: pdfgen
  labels:
    team: pdfgen
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 2
    scalingStrategy:
      cpu:
        thresholdPercentage: 90
  liveness:
    path: /internal/is_alive
    timeout: 1
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/is_alive
    timeout: 1
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 30
  leaderElection: false
  observability:
    logging:
      destinations:
        - id: loki
    autoInstrumentation:
      enabled: true
      runtime: sdk
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 100Mi
