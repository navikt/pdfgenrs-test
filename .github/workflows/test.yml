name: Test PDF generation
on:
  push:
    branches:
      - '*'

jobs:
  test-pdf-generation:
    name: Test PDF generation
    runs-on: ubuntu-latest
    env:
      PDFGENRS_IMAGE: ghcr.io/navikt/pdfgenrs:0.1.73
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Start pdfgenrs container
        run: |
          docker pull "$PDFGENRS_IMAGE"
          docker run \
            --name pdfgenrs \
            -v ${{ github.workspace }}/templates:/app/templates \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/fonts:/app/fonts \
            -v ${{ github.workspace }}/resources:/app/resources \
            -p 8080:8080 \
            -e DEV_MODE=true \
            --detach \
            "$PDFGENRS_IMAGE"
      - name: Wait for service to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8080; then
              echo "Service is ready"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "::error::Service did not become ready in time"
          echo "--- Container logs ---"
          docker logs pdfgenrs
          echo "--- Container status ---"
          docker inspect --format='{{.State.Status}} (exit code: {{.State.ExitCode}})' pdfgenrs
          exit 1
      - name: Generate PDF and verify response
        run: |
          http_status=$(curl -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d @data/pdfgenrs-test/pdfgenrs-test.json \
            http://localhost:8080/api/v1/genpdf/pdfgenrs-test/pdfgenrs-test \
            -o response.pdf)

          if [ "$http_status" != "200" ]; then
            echo "::error::Expected HTTP 200 but got $http_status"
            echo "--- Response body ---"
            cat response.pdf
            echo ""
            echo "--- Container logs ---"
            docker logs pdfgenrs
            exit 1
          fi

          file_type=$(file --mime-type -b response.pdf)
          echo "Response MIME type: $file_type"
          if [ "$file_type" != "application/pdf" ]; then
            echo "::error::Expected application/pdf but got $file_type"
            echo "--- Response body (first 200 bytes) ---"
            head -c 200 response.pdf
            echo ""
            echo "--- Container logs ---"
            docker logs pdfgenrs
            exit 1
          fi
          echo "PDF generation successful"
      - name: Show container logs
        if: always()
        run: |
          echo "--- Container logs ---"
          docker logs pdfgenrs 2>&1 || true
